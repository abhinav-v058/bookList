<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=kids_books_0_5_report.html" />
  <title>Book List Report</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --text: #e5edf7;
      --muted: #9fb0c9;
      --brand: #4f8cff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(79, 140, 255, 0.14), transparent 24%),
        linear-gradient(180deg, #09111e 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border-radius: 22px;
      background: rgba(17, 26, 46, 0.92);
      box-shadow: var(--shadow);
      border: 1px solid rgba(159, 176, 201, 0.14);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: #ffd479;
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening the Book Report…</h1>
    <p>You should be redirected automatically to the kids books report.</p>
    <p>If the redirect does not happen, click here:</p>
    <p><a href="kids_books_0_5_report.html">Open the report</a></p>
  </main>
</body>
</html>
